name: DealioBuilder
options:
  bundleIdPrefix: com.dealio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.15.0"
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.5.0"
targets:
  DealioBuilder:
    type: application
    platform: iOS
    sources:
      - path: DealioBuilder
      - path: GoogleService-Info.plist
        buildPhase: resources
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
      - package: Lottie
        product: Lottie
    entitlements:
      path: DealioBuilder/DealioBuilder.entitlements
      properties: {}
    info:
      path: DealioBuilder/Info.plist
      properties:
        CFBundleDisplayName: Dealio Builder
        NSFaceIDUsageDescription: Dealio uses Face ID to unlock the app and keep your account secure.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Allow plain-HTTP to the local backend during development (localhost:8090).
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dealio.builder
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
